name: Run Forge Tests

permissions:
  contents: write

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v2
      with:
        submodules: recursive
        ref: ${{ github.head_ref || github.ref_name }}
        fetch-depth: 0

    - name: Install Foundry
      uses: foundry-rs/foundry-toolchain@v1
      with:
        version: nightly

    - name: Set up Node.js
      uses: actions/setup-node@v2
      with:
        node-version: '18.x'

    - name: Install Dependencies
      run: npm install
    
    - name: Install openzeppelin-contracts
      run: forge install @openzeppelin/openzeppelin-contracts

    - name: Create remappings file
      run: |
        echo "forge-std/=lib/forge-std/src/" > remappings.txt
        echo "@openzeppelin/=lib/openzeppelin-contracts/" >> remappings.txt

    - name: Run Forge Tests
      run: forge test --ffi

    - name: Compile contracts
      run: npx hardhat compile

    - name: Start Hardhat node and run benchmarks
      run: |
        # Start hardhat node in background
        npx hardhat node &
        
        # Wait for node to be ready
        sleep 10
        
        # Run deployment script
        npx hardhat run scripts/deployStorageOrderBook.js
        
        # Run benchmark script
        npx hardhat run scripts/benchmarkStorageMargin.js
        
        # Kill the background hardhat node process
        kill $(lsof -t -i:8545) || true

    - name: Prettify benchmark results
      run: |
        node -e '
        const fs = require("fs");
        const file = "cranklessStorageOrderBookMargin.json";
        const data = JSON.parse(fs.readFileSync(file));
        fs.writeFileSync(file, JSON.stringify(data, null, 2));
        '

    - name: Commit changes
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add .
        git commit -m "Update benchmark results" || echo "No changes to commit"
        git push
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
